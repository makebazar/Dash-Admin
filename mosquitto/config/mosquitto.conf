# Mosquitto configuration for DashAdmin Agent Telemetry

# Listener
listener 1883
protocol mqtt

# WebSocket (optional, for future web UI)
# listener 9001
# protocol websockets

# Authentication
allow_anonymous false
password_file /mosquitto/config/pwfile

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections -1
max_keepalive 60
